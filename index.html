<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>文化祭ペンライト</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
text-align:center;
font-family:sans-serif;
background:black;
transition:background 0.5s;
}

button{
font-size:28px;
padding:20px 40px;
border:none;
border-radius:15px;
background:#ff66cc;
color:white;
}
</style>

</head>

<body>

<div id="startArea">
<button onclick="startShow()">ペンライトSTART</button>
<br><br>
スマホをペンライトにしてください✨<br>
明るさを最大に！
</div>

<script>

function changeColor(color){
document.body.style.background=color;
}

function rainbow(){
document.body.style.background =
"linear-gradient(90deg, red, orange, yellow, green, blue, purple)";
}

function startShow(){

document.getElementById("startArea").style.display="none"

//最初 全員
changeColor("white")

//会いにkite
setTimeout(()=>changeColor("#ff0000"),33000)   //❤️ 0:33
setTimeout(()=>changeColor("#7fe8ff"),43000)   //🩵 0:43
setTimeout(()=>changeColor("#0066ff"),53000)   //💙 0:53
setTimeout(()=>changeColor("#ff7ccf"),63000)   //🩷 1:03
setTimeout(()=>changeColor("#a64cff"),75000)   //💜 1:15
setTimeout(()=>changeColor("white"),86000)     //全員 1:26

//かわいいだけじゃだめですか？
setTimeout(()=>changeColor("#ff0000"),119000)  //❤️ 1:59

//金曜日のおはよう
setTimeout(()=>changeColor("#0066ff"),139000)  //💙 2:19

//らぶきゅん♡ウォンテッド
setTimeout(()=>changeColor("#a64cff"),241000)  //💜 4:01

//クリティカル♡ぷりちー
setTimeout(()=>changeColor("#ff7ccf"),328000)  //🩷 5:28

//君セン！
setTimeout(()=>changeColor("#7fe8ff"),428000)  //🩵 7:08
setTimeout(()=>changeColor("white"),486000)    //全員 8:06

//フィナーレ🌈
setTimeout(()=>rainbow(),554000)               //9:14

}

</script>

</body>
</html>
