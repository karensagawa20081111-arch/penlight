<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>文化祭ペンライト</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
text-align:center;
font-family:sans-serif;
background:black;
transition:background 0.5s;
}
</style>

<script>

function changeColor(color){
document.body.style.background=color;
}

//最初 全員
setTimeout(()=>changeColor("white"),0)

//会いにkite
setTimeout(()=>changeColor("#ff0000"),33000)   //❤️
setTimeout(()=>changeColor("#7fe8ff"),43000)   //🩵
setTimeout(()=>changeColor("#0066ff"),53000)   //💙
setTimeout(()=>changeColor("#ff7ccf"),63000)   //🩷
setTimeout(()=>changeColor("#a64cff"),75000)   //💜
setTimeout(()=>changeColor("white"),86000)     //全員

//かわいいだけじゃだめですか？
setTimeout(()=>changeColor("#ff0000"),119000)  //❤️

//金曜日のおはよう
setTimeout(()=>changeColor("#0066ff"),139000)  //💙

//らぶきゅん♡ウォンテッド
setTimeout(()=>changeColor("#a64cff"),241000)  //💜

//クリティカル♡ぷりちー
setTimeout(()=>changeColor("#ff7ccf"),328000)  //🩷

//君セン！
setTimeout(()=>changeColor("#7fe8ff"),428000)  //🩵
setTimeout(()=>changeColor("white"),486000)    //全員

</script>

</head>

<body>

<div>
スマホをペンライトにしてください✨<br>
明るさを最大に！
</div>

</body>
</html>
